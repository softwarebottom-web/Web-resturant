name: Unzip + Restructure
on: push
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract app.zip
        run: |
          unzip -o app.zip
          rm app.zip
          
      - name: Move files from app/ to root
        run: |
          shopt -s dotglob
          mv app/* .
          rm -r app
          
      - name: Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzip + move to root by Kimi 🗿" || exit 0
          git push
