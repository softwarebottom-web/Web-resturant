name: Unzip app.zip
on: push
jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract ZIP
        run: |
          unzip -o app.zip
          rm app.zip
      - name: Push extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto extracted by Actions 🗿" || exit 0
          git push
